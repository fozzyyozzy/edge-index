name: Edge Index Weekly Update

on:
  schedule:
    - cron: "0 11 * * 4"
    - cron: "0 12 * * 5"
    - cron: "0 13 * * 1"

  workflow_dispatch:
    inputs:
      week:
        description: "NFL Week number"
        required: true
        default: "10"
      season:
        description: "Season year"
        required: false
        default: "2025"
      force_refresh:
        description: "Force re-scrape (ignore cache)"
        required: false
        default: "false"
        type: boolean

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install playwright
          playwright install chromium --with-deps

      - name: Restore parquet cache
        uses: actions/cache@v4
        with:
          path: |
            data/cache/
            data/processed/
          key: parquet-cache-${{ github.run_id }}
          restore-keys: |
            parquet-cache-

      - name: Determine current NFL week
        id: week
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "week=${{ github.event.inputs.week }}" >> $GITHUB_OUTPUT
            echo "season=${{ github.event.inputs.season }}" >> $GITHUB_OUTPUT
          else
            python3 -c "
          from datetime import date
          season_start = date(2025, 9, 4)
          today = date.today()
          delta = (today - season_start).days
          week = max(1, min(18, delta // 7 + 1))
          print(f'week={week}')
          print(f'season=2025')
          " >> $GITHUB_OUTPUT
          fi

      - name: Run PFR scraper pipeline
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          REFRESH_FLAG=""
          if [ "${{ github.event.inputs.force_refresh }}" = "true" ]; then
            REFRESH_FLAG="--refresh"
          fi
          python3 scrapers/pfr_scraper.py \
            --week ${{ steps.week.outputs.week }} \
            --season ${{ steps.week.outputs.season }} \
            --players players.json \
            $REFRESH_FLAG

      - name: Generate weekly pick sheet
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python3 scripts/generate_pick_sheet.py \
            --week ${{ steps.week.outputs.week }} \
            --season ${{ steps.week.outputs.season }}

      - name: Save parquet cache
        uses: actions/cache@v4
        with:
          path: |
            data/cache/
            data/processed/
          key: parquet-cache-${{ github.run_id }}

      - name: Commit updated data
        run: |
          git config user.name  "Edge Index Bot"
          git config user.email "bot@edge-index.com"
          git add data/processed/ data/logs/ outputs/
          git diff --staged --quiet || \
            git commit -m "auto: Week ${{ steps.week.outputs.week }} data update [skip ci]"
          git push

  update-results:
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 13 * * 1'
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pandas pyarrow openpyxl

      - name: Update results tracker
        run: |
          python3 scripts/update_results.py \
            --results-file results/results_tracker.csv

      - name: Commit results
        run: |
          git config user.name  "Edge Index Bot"
          git config user.email "bot@edge-index.com"
          git add results/
          git diff --staged --quiet || \
            git commit -m "auto: results update [skip ci]"
          git push
